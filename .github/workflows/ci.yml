name: CI

on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # pnpm version is read from package.json's `packageManager` field
      # (single source of truth — passing `version:` here errors when the two disagree).
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          # Required at build time (config-load) per requireEnv() in
          # payload.config.ts. Placeholder values — build doesn't connect.
          PAYLOAD_SECRET: ci-placeholder-secret-for-build-only
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
