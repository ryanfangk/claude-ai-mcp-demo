services:
  postgres:
    image: postgres:16-alpine
    container_name: claude-ai-mcp-demo-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: claude_ai_mcp_demo
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
